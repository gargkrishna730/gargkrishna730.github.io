name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─── Job 1: Build & Deploy Static Site to GitHub Pages ───
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build
        env:
          BASE_PATH: ""   # Set to '/your-repo-name' if deploying to a subdirectory
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.CONTACT_API_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Job 2: Deploy Contact API Worker to Cloudflare ───
  deploy-worker:
    runs-on: ubuntu-latest
    # Only deploy worker if secrets are configured (avoids failure if user skips Cloudflare)
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Worker dependencies
        working-directory: workers/contact-api
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/contact-api
          command: deploy --secret RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          secrets: |
            RESEND_API_KEY